name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run test:cov

      - run: npm run build

      - name: Zip extension
        run: zip -r livewatch-${{ github.ref_name }}.zip dist/

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} livewatch-${{ github.ref_name }}.zip --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
